services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: budget_explorer
      POSTGRES_USER: budget_explorer
      POSTGRES_PASSWORD: budget_explorer
    ports:
      - "5432:5432"
    volumes:
      - budget_explorer_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget_explorer -d budget_explorer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  budget_explorer_postgres:
